<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inner Universe — Shakirah's Journal</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap');

  :root {
    --night: #0d0d1a;
    --deep: #11112b;
    --void: #16163a;
    --aqua: #5bc8d4;
    --aqua-dim: #2a6b72;
    --lavender: #a89fd8;
    --lavender-dim: #4a4470;
    --gold: #c9a84c;
    --gold-dim: #6b5520;
    --mist: rgba(255,255,255,0.05);
    --mist-hover: rgba(255,255,255,0.09);
    --text-primary: #e8e6f0;
    --text-secondary: #9691b8;
    --text-dim: #5e5a80;
    --border: rgba(255,255,255,0.07);
    --border-aqua: rgba(91,200,212,0.25);
    --border-hover: rgba(255,255,255,0.14);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--night);
    color: var(--text-primary);
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    min-height: 100vh;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(1px 1px at 10% 15%, rgba(255,255,255,0.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 25% 40%, rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 40% 8%, rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 55% 30%, rgba(255,255,255,0.2) 0%, transparent 100%),
      radial-gradient(1px 1px at 70% 55%, rgba(255,255,255,0.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 85% 20%, rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 92% 70%, rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 5% 80%, rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 35% 65%, rgba(255,255,255,0.2) 0%, transparent 100%),
      radial-gradient(1px 1px at 60% 85%, rgba(255,255,255,0.35) 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 78% 10%, rgba(91,200,212,0.6) 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 18% 55%, rgba(168,159,216,0.5) 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 48% 90%, rgba(201,168,76,0.4) 0%, transparent 100%);
    pointer-events: none;
    z-index: 0;
  }

  .page {
    position: relative;
    z-index: 1;
    max-width: 800px;
    margin: 0 auto;
    padding: 3rem 2rem 6rem;
  }

  /* ── Header ── */
  .header { text-align: center; margin-bottom: 3rem; }
  .aquarius-glyph { font-size: 1.8rem; margin-bottom: 1rem; display: block; letter-spacing: 0.3em; color: var(--aqua); opacity: 0.8; }
  .header-title { font-family: 'Cormorant Garamond', serif; font-size: 2.6rem; font-weight: 300; font-style: italic; line-height: 1.2; letter-spacing: 0.02em; margin-bottom: 0.4rem; }
  .header-sub { font-size: 11px; font-weight: 400; letter-spacing: 0.18em; text-transform: uppercase; color: var(--text-dim); }
  .header-line { width: 60px; height: 1px; background: linear-gradient(90deg, transparent, var(--aqua), transparent); margin: 1.2rem auto 0; }

  /* ── Section label ── */
  .section-label { font-size: 10px; font-weight: 500; letter-spacing: 0.2em; text-transform: uppercase; color: var(--text-dim); margin-bottom: 1rem; display: flex; align-items: center; gap: 10px; }
  .section-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  /* ── Stats ── */
  .stat-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 2.5rem; }
  .stat-card { background: var(--mist); border: 0.5px solid var(--border); border-radius: 12px; padding: 1.1rem 1rem; text-align: center; }
  .stat-num { font-family: 'Cormorant Garamond', serif; font-size: 2rem; font-weight: 300; color: var(--aqua); line-height: 1; margin-bottom: 4px; }
  .stat-label { font-size: 11px; color: var(--text-dim); letter-spacing: 0.06em; }

  /* ── Entries ── */
  .entries-section { margin-bottom: 2.5rem; }

  .entry-card { background: var(--mist); border: 0.5px solid var(--border); border-radius: 14px; padding: 1.3rem 1.4rem; margin-bottom: 10px; position: relative; overflow: hidden; transition: border-color 0.2s; }
  .entry-card:hover { border-color: var(--border-hover); }
  .entry-card::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 2px; background: linear-gradient(180deg, var(--aqua), var(--lavender)); border-radius: 2px 0 0 2px; }

  .entry-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
  .entry-meta { display: flex; align-items: center; gap: 10px; }
  .entry-date { font-size: 11px; color: var(--text-dim); letter-spacing: 0.08em; }
  .entry-moon { font-size: 13px; opacity: 0.6; }
  .entry-actions { display: flex; gap: 8px; opacity: 0; transition: opacity 0.2s; }
  .entry-card:hover .entry-actions { opacity: 1; }
  .btn-icon { background: none; border: none; color: var(--text-dim); cursor: pointer; font-size: 12px; padding: 2px 4px; transition: color 0.2s; }
  .btn-icon:hover { color: var(--aqua); }

  .entry-title { font-family: 'Cormorant Garamond', serif; font-size: 1.1rem; font-style: italic; color: var(--text-primary); margin-bottom: 6px; font-weight: 300; }
  .entry-preview { font-size: 13px; color: var(--text-secondary); line-height: 1.7; white-space: pre-wrap; }

  .entry-tags { display: flex; gap: 6px; margin-top: 10px; flex-wrap: wrap; }
  .tag { font-size: 10px; letter-spacing: 0.06em; padding: 3px 10px; border-radius: 20px; border: 0.5px solid; cursor: pointer; }
  .tag-aqua { color: var(--aqua); border-color: var(--aqua-dim); background: rgba(91,200,212,0.07); }
  .tag-lavender { color: var(--lavender); border-color: var(--lavender-dim); background: rgba(168,159,216,0.07); }
  .tag-gold { color: var(--gold); border-color: var(--gold-dim); background: rgba(201,168,76,0.07); }

  /* ── Add entry button ── */
  .add-entry-btn { border: 1px dashed var(--border); border-radius: 14px; padding: 1.1rem; text-align: center; color: var(--text-dim); font-size: 13px; cursor: pointer; transition: all 0.2s; letter-spacing: 0.05em; width: 100%; background: none; font-family: 'DM Sans', sans-serif; }
  .add-entry-btn:hover { border-color: var(--aqua-dim); color: var(--aqua); background: rgba(91,200,212,0.04); }

  /* ── Modal ── */
  .modal-overlay { position: fixed; inset: 0; background: rgba(5,5,15,0.85); z-index: 100; display: flex; align-items: center; justify-content: center; padding: 1.5rem; opacity: 0; pointer-events: none; transition: opacity 0.25s; }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal { background: #12122a; border: 0.5px solid rgba(91,200,212,0.2); border-radius: 18px; padding: 2rem; width: 100%; max-width: 580px; max-height: 88vh; overflow-y: auto; }
  .modal-title { font-family: 'Cormorant Garamond', serif; font-size: 1.4rem; font-style: italic; font-weight: 300; margin-bottom: 1.4rem; color: var(--text-primary); }

  label { font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-dim); display: block; margin-bottom: 6px; margin-top: 14px; }
  label:first-of-type { margin-top: 0; }

  input[type=text], textarea, select {
    width: 100%; background: rgba(255,255,255,0.04); border: 0.5px solid var(--border-hover); border-radius: 8px;
    color: var(--text-primary); font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 300;
    padding: 10px 12px; outline: none; transition: border-color 0.2s;
  }
  input[type=text]:focus, textarea:focus, select:focus { border-color: var(--aqua-dim); }
  textarea { resize: vertical; min-height: 140px; line-height: 1.7; }
  select option { background: #12122a; }

  .tag-selector { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 4px; }
  .tag-option { font-size: 11px; padding: 4px 12px; border-radius: 20px; border: 0.5px solid var(--border-hover); color: var(--text-dim); cursor: pointer; transition: all 0.15s; background: none; font-family: 'DM Sans', sans-serif; }
  .tag-option.selected-aqua { color: var(--aqua); border-color: var(--aqua); background: rgba(91,200,212,0.1); }
  .tag-option.selected-lavender { color: var(--lavender); border-color: var(--lavender); background: rgba(168,159,216,0.1); }
  .tag-option.selected-gold { color: var(--gold); border-color: var(--gold); background: rgba(201,168,76,0.1); }

  .modal-actions { display: flex; gap: 10px; margin-top: 1.6rem; justify-content: flex-end; }
  .btn-cancel { background: none; border: 0.5px solid var(--border-hover); border-radius: 8px; color: var(--text-dim); font-family: 'DM Sans', sans-serif; font-size: 13px; padding: 9px 18px; cursor: pointer; transition: all 0.2s; }
  .btn-cancel:hover { border-color: var(--text-dim); color: var(--text-primary); }
  .btn-save { background: rgba(91,200,212,0.12); border: 0.5px solid var(--aqua-dim); border-radius: 8px; color: var(--aqua); font-family: 'DM Sans', sans-serif; font-size: 13px; padding: 9px 22px; cursor: pointer; transition: all 0.2s; }
  .btn-save:hover { background: rgba(91,200,212,0.2); border-color: var(--aqua); }

  /* ── Two col ── */
  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 2.5rem; }

  /* ── Reading ── */
  .book-card { background: var(--mist); border: 0.5px solid var(--border); border-radius: 14px; padding: 1.1rem 1.3rem; margin-bottom: 10px; transition: border-color 0.2s; }
  .book-card:hover { border-color: var(--border-hover); }
  .book-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 4px; gap: 8px; }
  .book-title-text { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 1rem; color: var(--text-primary); font-weight: 300; line-height: 1.3; }
  .book-author { font-size: 11px; color: var(--text-dim); margin-bottom: 8px; }
  .book-status { font-size: 10px; padding: 3px 9px; border-radius: 20px; letter-spacing: 0.06em; white-space: nowrap; flex-shrink: 0; }
  .status-reading { color: var(--aqua); border: 0.5px solid var(--aqua-dim); background: rgba(91,200,212,0.07); }
  .status-next { color: var(--text-dim); border: 0.5px solid var(--border); }
  .status-done { color: var(--gold); border: 0.5px solid var(--gold-dim); background: rgba(201,168,76,0.07); }
  .progress-bar { height: 2px; background: var(--border); border-radius: 2px; overflow: hidden; margin-bottom: 5px; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--aqua), var(--lavender)); border-radius: 2px; transition: width 0.4s; }
  .book-note { font-size: 12px; color: var(--text-secondary); line-height: 1.6; font-style: italic; margin-top: 6px; padding-top: 6px; border-top: 0.5px solid var(--border); }
  .book-edit-row { display: flex; gap: 6px; margin-top: 8px; }
  .progress-input { width: 60px; background: rgba(255,255,255,0.04); border: 0.5px solid var(--border); border-radius: 6px; color: var(--text-secondary); font-size: 11px; padding: 3px 6px; text-align: center; font-family: 'DM Sans', sans-serif; }
  .progress-input:focus { outline: none; border-color: var(--aqua-dim); }
  .btn-tiny { background: none; border: 0.5px solid var(--border); border-radius: 6px; color: var(--text-dim); font-size: 10px; padding: 3px 8px; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: all 0.15s; }
  .btn-tiny:hover { border-color: var(--aqua-dim); color: var(--aqua); }

  /* ── Themes ── */
  .panel { background: var(--mist); border: 0.5px solid var(--border); border-radius: 14px; padding: 1.3rem 1.4rem; }
  .panel-title { font-family: 'Cormorant Garamond', serif; font-size: 0.95rem; font-style: italic; color: var(--text-secondary); margin-bottom: 1rem; font-weight: 300; }
  .theme-item { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 0.5px solid var(--border); }
  .theme-item:last-child { border-bottom: none; }
  .theme-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
  .dot-aqua { background: var(--aqua); }
  .dot-lavender { background: var(--lavender); }
  .dot-gold { background: var(--gold); }
  .theme-name { font-size: 13px; color: var(--text-secondary); flex: 1; }
  .theme-count { font-size: 12px; color: var(--aqua); font-family: 'Cormorant Garamond', serif; }

  /* ── Prompts ── */
  .prompts-section { margin-bottom: 2.5rem; }
  .prompt-card { background: var(--mist); border: 0.5px solid var(--border-aqua); border-radius: 14px; padding: 1.3rem 1.4rem; margin-bottom: 10px; cursor: pointer; transition: all 0.2s; }
  .prompt-card:hover { background: rgba(91,200,212,0.05); border-color: rgba(91,200,212,0.4); }
  .prompt-glyph { font-size: 1.1rem; margin-bottom: 8px; display: block; opacity: 0.7; }
  .prompt-text { font-family: 'Cormorant Garamond', serif; font-size: 1.05rem; font-style: italic; color: var(--text-primary); line-height: 1.7; font-weight: 300; }
  .prompt-chapter { font-size: 10px; color: var(--text-dim); letter-spacing: 0.12em; margin-top: 8px; text-transform: uppercase; }
  .prompt-hint { font-size: 11px; color: var(--aqua); margin-top: 6px; opacity: 0; transition: opacity 0.2s; }
  .prompt-card:hover .prompt-hint { opacity: 0.7; }

  /* ── Footer ── */
  .footer { text-align: center; margin-top: 4rem; padding-top: 2rem; border-top: 0.5px solid var(--border); }
  .footer-glyphs { font-size: 1rem; letter-spacing: 0.4em; opacity: 0.25; margin-bottom: 0.5rem; }
  .footer-text { font-size: 11px; color: var(--text-dim); letter-spacing: 0.12em; }

  /* ── Toast ── */
  .toast { position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%) translateY(10px); background: rgba(91,200,212,0.15); border: 0.5px solid var(--aqua-dim); border-radius: 10px; color: var(--aqua); font-size: 12px; padding: 10px 20px; letter-spacing: 0.06em; z-index: 200; opacity: 0; transition: all 0.3s; pointer-events: none; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ── Empty state ── */
  .empty-entries { text-align: center; padding: 2rem 1rem; color: var(--text-dim); font-size: 13px; line-height: 1.8; border: 1px dashed var(--border); border-radius: 14px; margin-bottom: 10px; }
  .empty-entries .glyph { font-size: 1.4rem; margin-bottom: 0.6rem; display: block; opacity: 0.4; }

  @media (max-width: 540px) {
    .two-col { grid-template-columns: 1fr; }
    .header-title { font-size: 2rem; }
    .page { padding: 2rem 1.2rem 5rem; }
  }
</style>
</head>
<body>
<div class="page">

  <header class="header">
    <span class="aquarius-glyph">♒ ✦ ☽</span>
    <h1 class="header-title">Inner Universe</h1>
    <p class="header-sub">Shakirah's Voice Journal & Book in Progress</p>
    <div class="header-line"></div>
  </header>

  <!-- Stats -->
  <div class="stat-row">
    <div class="stat-card">
      <div class="stat-num" id="stat-entries">0</div>
      <div class="stat-label">entries total</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" id="stat-month">0</div>
      <div class="stat-label">this month</div>
    </div>
    <div class="stat-card">
      <div class="stat-num">∞</div>
      <div class="stat-label">still becoming</div>
    </div>
  </div>

  <!-- Journal Entries -->
  <section class="entries-section">
    <div class="section-label">Voice Journal Entries</div>
    <div id="entries-list"></div>
    <button class="add-entry-btn" onclick="openModal()">✦ &nbsp; add today's voice transcript</button>
  </section>

  <!-- Two col -->
  <div class="two-col">

    <!-- Reading -->
    <div>
      <div class="section-label">Reading</div>
      <div id="books-list"></div>
      <button class="add-entry-btn" style="font-size:12px; padding:0.8rem;" onclick="openBookModal()">+ add a book</button>
    </div>

    <!-- Themes -->
    <div>
      <div class="section-label">Emerging Themes</div>
      <div class="panel">
        <div class="panel-title">what keeps surfacing</div>
        <div id="themes-list"></div>
      </div>
    </div>
  </div>

  <!-- Prompts -->
  <section class="prompts-section">
    <div class="section-label">Prompts to Speak Into</div>
    <div id="prompts-list"></div>
  </section>

  <footer class="footer">
    <div class="footer-glyphs">♒ ☽ ✦ ◯ ⟡</div>
    <div class="footer-text">you are not lost · you are mid-becoming</div>
  </footer>
</div>

<!-- Entry Modal -->
<div class="modal-overlay" id="entry-modal">
  <div class="modal">
    <div class="modal-title" id="modal-title-text">a new entry</div>
    <label>Title or feeling (optional)</label>
    <input type="text" id="entry-title-input" placeholder="what is alive in you today..." />
    <label>Your transcript</label>
    <textarea id="entry-body-input" placeholder="paste your voice transcript here, or type freely..."></textarea>
    <label>Themes</label>
    <div class="tag-selector" id="tag-selector"></div>
    <label>Moon phase (optional)</label>
    <input type="text" id="entry-moon-input" placeholder="🌒 🌕 🌘 or leave blank" style="width:180px;" />
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">cancel</button>
      <button class="btn-save" onclick="saveEntry()">save entry</button>
    </div>
  </div>
</div>

<!-- Book Modal -->
<div class="modal-overlay" id="book-modal">
  <div class="modal">
    <div class="modal-title">add a book</div>
    <label>Title</label>
    <input type="text" id="book-title-input" placeholder="book title..." />
    <label>Author</label>
    <input type="text" id="book-author-input" placeholder="author name..." />
    <label>Status</label>
    <select id="book-status-input">
      <option value="reading">currently reading</option>
      <option value="next">up next</option>
      <option value="done">finished</option>
    </select>
    <label>Progress (0–100%)</label>
    <input type="text" id="book-progress-input" placeholder="0" style="width:80px;" />
    <label>Note or what's resonating</label>
    <textarea id="book-note-input" placeholder="what struck you..." style="min-height:80px;"></textarea>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeBookModal()">cancel</button>
      <button class="btn-save" onclick="saveBook()">add book</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
const GLYPHS = ['♒','☽','✦','◯','⟡','★','⊹','∘'];
const MOONS = ['🌑','🌒','🌓','🌔','🌕','🌖','🌗','🌘'];

const ALL_TAGS = [
  { label: 'identity', color: 'aqua' },
  { label: 'clarity', color: 'lavender' },
  { label: 'grief', color: 'gold' },
  { label: 'pain', color: 'aqua' },
  { label: 'joy', color: 'lavender' },
  { label: 'becoming', color: 'gold' },
  { label: 'confusion', color: 'aqua' },
  { label: 'alignment', color: 'lavender' },
  { label: 'loss', color: 'gold' },
  { label: 'growth', color: 'aqua' },
  { label: 'voice', color: 'lavender' },
  { label: 'truth', color: 'gold' },
];

const DEFAULT_PROMPTS = [
  { glyph: '♒', text: 'What is the version of me that has been running my life — and when did I first notice she wasn\'t really me?', chapter: 'the foundation · speak freely, no editing' },
  { glyph: '☽', text: 'What is the change I feel pulled toward, even though I can\'t fully name it yet?', chapter: 'chapter 1 · meeting pain face-to-face' },
  { glyph: '✦', text: 'Whose decisions have I been living? Where did I stop asking myself what I actually wanted?', chapter: 'chapter 2 · listening to pain\'s message' },
  { glyph: '◯', text: 'Describe a moment when going through something hard made you genuinely better at loving or leading someone else.', chapter: 'chapter 3 · when pain shows you joy' },
  { glyph: '⟡', text: 'What am I most afraid of losing if I become who I\'m becoming?', chapter: 'chapter 5 · walking in alignment' },
  { glyph: '★', text: 'If the part of me that knows the truth wrote a letter to the part of me that performs — what would it say?', chapter: 'chapter 6 · pain\'s parting gift' },
];

const DEFAULT_BOOKS = [
  { title: 'Eat, Pray, Love', author: 'Elizabeth Gilbert', status: 'reading', progress: 40, note: 'What\'s landing: her loud outward reaction to a change she couldn\'t name yet. That\'s familiar.' },
  { title: 'Bird by Bird', author: 'Anne Lamott', status: 'next', progress: 0, note: 'For when you sit down to write and the page feels impossible.' },
  { title: 'The War of Art', author: 'Steven Pressfield', status: 'next', progress: 0, note: '' },
];

// ── State ──
let state = {
  entries: [],
  books: [],
  prompts: DEFAULT_PROMPTS,
};

let editingEntryId = null;
let selectedTags = [];

function load() {
  try {
    const saved = localStorage.getItem('inner_universe_v1');
    if (saved) {
      const parsed = JSON.parse(saved);
      state.entries = parsed.entries || [];
      state.books = parsed.books || DEFAULT_BOOKS;
      state.prompts = parsed.prompts || DEFAULT_PROMPTS;
    } else {
      state.books = DEFAULT_BOOKS;
      state.prompts = DEFAULT_PROMPTS;
    }
  } catch(e) {
    state.books = DEFAULT_BOOKS;
    state.prompts = DEFAULT_PROMPTS;
  }
  render();
}

function save() {
  localStorage.setItem('inner_universe_v1', JSON.stringify(state));
}

// ── Render ──
function render() {
  renderStats();
  renderEntries();
  renderBooks();
  renderThemes();
  renderPrompts();
}

function renderStats() {
  document.getElementById('stat-entries').textContent = state.entries.length;
  const now = new Date();
  const thisMonth = state.entries.filter(e => {
    const d = new Date(e.date);
    return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
  }).length;
  document.getElementById('stat-month').textContent = thisMonth;
}

function renderEntries() {
  const list = document.getElementById('entries-list');
  if (state.entries.length === 0) {
    list.innerHTML = `<div class="empty-entries"><span class="glyph">☽</span>your entries will live here<br><span style="font-size:12px;opacity:0.7;">speak, paste your transcript, and save</span></div>`;
    return;
  }
  const sorted = [...state.entries].sort((a,b) => new Date(b.date) - new Date(a.date));
  list.innerHTML = sorted.map(e => {
    const d = new Date(e.date);
    const dateStr = d.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
    const moon = e.moon || MOONS[d.getDate() % 8];
    const tags = (e.tags || []).map(t => `<span class="tag tag-${t.color}">${t.label}</span>`).join('');
    const preview = e.body.length > 220 ? e.body.slice(0, 220) + '…' : e.body;
    return `
      <div class="entry-card">
        <div class="entry-header">
          <div class="entry-meta">
            <span class="entry-date">${dateStr}</span>
            <span class="entry-moon">${moon}</span>
          </div>
          <div class="entry-actions">
            <button class="btn-icon" onclick="editEntry('${e.id}')" title="edit">edit</button>
            <button class="btn-icon" onclick="deleteEntry('${e.id}')" title="delete" style="color:var(--gold-dim);">delete</button>
          </div>
        </div>
        ${e.title ? `<div class="entry-title">${e.title}</div>` : ''}
        <div class="entry-preview">${preview}</div>
        ${tags ? `<div class="entry-tags">${tags}</div>` : ''}
      </div>`;
  }).join('');
}

function renderBooks() {
  const list = document.getElementById('books-list');
  list.innerHTML = state.books.map((b, i) => {
    const statusClass = { reading: 'status-reading', next: 'status-next', done: 'status-done' }[b.status];
    const statusLabel = { reading: 'reading', next: 'up next', done: 'finished' }[b.status];
    const prog = b.progress || 0;
    return `
      <div class="book-card">
        <div class="book-header">
          <div class="book-title-text">${b.title}</div>
          <span class="book-status ${statusClass}">${statusLabel}</span>
        </div>
        <div class="book-author">${b.author}</div>
        ${b.status === 'reading' || prog > 0 ? `
        <div class="progress-bar"><div class="progress-fill" style="width:${prog}%"></div></div>
        <div class="book-edit-row">
          <input class="progress-input" type="text" value="${prog}%" id="prog-${i}" />
          <button class="btn-tiny" onclick="updateProgress(${i})">update</button>
          <button class="btn-tiny" onclick="deleteBook(${i})" style="color:var(--text-dim);margin-left:auto;">remove</button>
        </div>` : `<div style="text-align:right;"><button class="btn-tiny" onclick="deleteBook(${i})" style="color:var(--text-dim);">remove</button></div>`}
        ${b.note ? `<div class="book-note">${b.note}</div>` : ''}
      </div>`;
  }).join('');
}

function renderThemes() {
  const list = document.getElementById('themes-list');
  const counts = {};
  state.entries.forEach(e => {
    (e.tags || []).forEach(t => {
      counts[t.label] = (counts[t.label] || { count: 0, color: t.color });
      counts[t.label].count++;
    });
  });

  const sorted = Object.entries(counts).sort((a,b) => b[1].count - a[1].count);

  const defaults = [
    { label: 'identity & performance', color: 'aqua' },
    { label: 'pain as guide', color: 'lavender' },
    { label: 'grief & loss', color: 'gold' },
    { label: 'clarity mid-journey', color: 'aqua' },
    { label: 'finding my voice', color: 'lavender' },
    { label: 'what\'s next', color: 'gold' },
  ];

  if (sorted.length === 0) {
    list.innerHTML = defaults.map(t => `
      <div class="theme-item">
        <div class="theme-dot dot-${t.color}"></div>
        <span class="theme-name">${t.label}</span>
        <span class="theme-count">—</span>
      </div>`).join('');
  } else {
    list.innerHTML = sorted.slice(0, 6).map(([label, val]) => `
      <div class="theme-item">
        <div class="theme-dot dot-${val.color}"></div>
        <span class="theme-name">${label}</span>
        <span class="theme-count">${val.count}</span>
      </div>`).join('');
  }
}

function renderPrompts() {
  const list = document.getElementById('prompts-list');
  list.innerHTML = state.prompts.map((p, i) => `
    <div class="prompt-card" onclick="usePrompt(${i})">
      <span class="prompt-glyph">${p.glyph}</span>
      <div class="prompt-text">${p.text}</div>
      <div class="prompt-chapter">${p.chapter}</div>
      <div class="prompt-hint">✦ tap to use this prompt as today's entry</div>
    </div>`).join('');
}

// ── Entry Modal ──
function openModal(prefill) {
  editingEntryId = null;
  selectedTags = [];
  document.getElementById('entry-title-input').value = prefill || '';
  document.getElementById('entry-body-input').value = '';
  document.getElementById('entry-moon-input').value = '';
  document.getElementById('modal-title-text').textContent = 'a new entry';
  renderTagSelector();
  document.getElementById('entry-modal').classList.add('open');
}

function editEntry(id) {
  const e = state.entries.find(x => x.id === id);
  if (!e) return;
  editingEntryId = id;
  selectedTags = [...(e.tags || [])];
  document.getElementById('entry-title-input').value = e.title || '';
  document.getElementById('entry-body-input').value = e.body || '';
  document.getElementById('entry-moon-input').value = e.moon || '';
  document.getElementById('modal-title-text').textContent = 'edit entry';
  renderTagSelector();
  document.getElementById('entry-modal').classList.add('open');
}

function closeModal() {
  document.getElementById('entry-modal').classList.remove('open');
  editingEntryId = null;
}

function renderTagSelector() {
  const sel = document.getElementById('tag-selector');
  sel.innerHTML = ALL_TAGS.map(t => {
    const isSelected = selectedTags.some(s => s.label === t.label);
    const cls = isSelected ? `selected-${t.color}` : '';
    return `<button class="tag-option ${cls}" onclick="toggleTag('${t.label}','${t.color}')">${t.label}</button>`;
  }).join('');
}

function toggleTag(label, color) {
  const idx = selectedTags.findIndex(t => t.label === label);
  if (idx >= 0) selectedTags.splice(idx, 1);
  else selectedTags.push({ label, color });
  renderTagSelector();
}

function saveEntry() {
  const title = document.getElementById('entry-title-input').value.trim();
  const body = document.getElementById('entry-body-input').value.trim();
  const moon = document.getElementById('entry-moon-input').value.trim();
  if (!body) { showToast('please add your transcript first ✦'); return; }

  if (editingEntryId) {
    const idx = state.entries.findIndex(e => e.id === editingEntryId);
    if (idx >= 0) {
      state.entries[idx] = { ...state.entries[idx], title, body, moon, tags: [...selectedTags] };
    }
    showToast('entry updated ✦');
  } else {
    state.entries.push({
      id: Date.now().toString(),
      date: new Date().toISOString(),
      title,
      body,
      moon,
      tags: [...selectedTags],
    });
    showToast('entry saved ✦');
  }

  save();
  render();
  closeModal();
}

function deleteEntry(id) {
  if (!confirm('remove this entry?')) return;
  state.entries = state.entries.filter(e => e.id !== id);
  save();
  render();
  showToast('entry removed');
}

// ── Book Modal ──
function openBookModal() {
  document.getElementById('book-title-input').value = '';
  document.getElementById('book-author-input').value = '';
  document.getElementById('book-status-input').value = 'next';
  document.getElementById('book-progress-input').value = '';
  document.getElementById('book-note-input').value = '';
  document.getElementById('book-modal').classList.add('open');
}

function closeBookModal() {
  document.getElementById('book-modal').classList.remove('open');
}

function saveBook() {
  const title = document.getElementById('book-title-input').value.trim();
  const author = document.getElementById('book-author-input').value.trim();
  if (!title) { showToast('add a title ✦'); return; }
  const status = document.getElementById('book-status-input').value;
  const progress = parseInt(document.getElementById('book-progress-input').value) || 0;
  const note = document.getElementById('book-note-input').value.trim();
  state.books.push({ title, author, status, progress, note });
  save();
  render();
  closeBookModal();
  showToast('book added ✦');
}

function updateProgress(i) {
  const val = document.getElementById(`prog-${i}`).value.replace('%','').trim();
  const num = parseInt(val);
  if (!isNaN(num)) {
    state.books[i].progress = Math.min(100, Math.max(0, num));
    if (state.books[i].progress === 100) state.books[i].status = 'done';
    save();
    render();
    showToast('progress updated ✦');
  }
}

function deleteBook(i) {
  if (!confirm('remove this book?')) return;
  state.books.splice(i, 1);
  save();
  render();
}

// ── Prompts ──
function usePrompt(i) {
  const p = state.prompts[i];
  openModal(p.text);
}

// ── Toast ──
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2400);
}

// ── Close modals on overlay click ──
document.getElementById('entry-modal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});
document.getElementById('book-modal').addEventListener('click', function(e) {
  if (e.target === this) closeBookModal();
});

load();
</script>
</body>
</html>
